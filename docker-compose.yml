services:
  drathos-backend:
    container_name: drathos-backend
    image: valt1n/drathos-backend:latest
    build:
      context: .
    restart: unless-stopped
    environment:
      - API_PORT=5001
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME required}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD required}@mongodb:27017/drathos?authSource=admin
      - JWT_TOKEN=${JWT_TOKEN:?JWT_TOKEN required}
      - CORS_STRICT_MODE=${CORS_STRICT_MODE:-true}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS required}
      - GAME_FILES_DIR=/usr/src/app/serverData/serverGames
      - MOD_FILES_DIR=/usr/src/app/serverData/serverMods
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:?TWITCH_CLIENT_ID required}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET:?TWITCH_CLIENT_SECRET required}
    ports:
      - "8080:5001"
    volumes:
      - server-data:/usr/src/app/serverData
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - traefik_network
      - drathos_network
    ## Traefik Labels
    labels:
      - "traefik.enable=true"
      - "tag=app-external"
      # Web interface accessible on the same domain
      - "traefik.http.routers.drathos-backend.rule=Host(`drathos.home.arpa`)"
      - "traefik.http.routers.drathos-backend.entrypoints=https"
      - "traefik.http.routers.drathos-backend.service=drathos-backend"
      - "traefik.http.services.drathos-backend.loadbalancer.server.port=5001"
      - "traefik.http.routers.drathos-backend.tls=true"
      - "traefik.http.routers.drathos-backend.tls.certresolver=stepca"
      # Disable buffering for large downloads
      - "traefik.http.middlewares.nobuffering.buffering.maxRequestBodyBytes=0"
      - "traefik.http.middlewares.nobuffering.buffering.maxResponseBodyBytes=0"
      - "traefik.http.middlewares.nobuffering.buffering.memRequestBodyBytes=0"
      - "traefik.http.middlewares.nobuffering.buffering.memResponseBodyBytes=0"
      - "traefik.http.routers.drathos-backend.middlewares=nobuffering"

  mongodb:
    container_name: drathos-db
    # mongo:8 is the supported default. On CPUs without AVX (mongo:5+ requires it),
    # fall back to `mongo:4` AND change the healthcheck below from `mongosh` to `mongo`.
    image: mongo:8
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME required}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD required}
      - MONGO_INITDB_DATABASE=drathos
    volumes:
      - mongo-data:/data/db
    networks:
      - drathos_network
    healthcheck:
      # mongo:4 fallback: replace `mongosh` with `mongo` (the legacy shell was removed in mongo:6)
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USERNAME}", "-p", "${MONGO_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo-data:
  server-data:

networks:
  traefik_network:
    external: true
  drathos_network:
    external: true

services:
  api:
    container_name: drathos-back
    image: valt1n/drathos-backend:latest
    build:
      context: .
    environment:
      - API_PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/drathos
      - JWT_TOKEN=hide_this
    ports:
      - "8080:5001"
    depends_on:
      - mongodb

  mongodb:
    container_name: drathos-db
    image: mongo:4
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

version: "3.8"

services:
  api:
    image: votre-username/mon-api:latest # Ou mon-api:latest si image locale
    build:
      context: .
    environment:
      - API_PORT=${API_PORT:-5001}
      - MONGODB_URI=mongodb://mongo:27017/drathos
      - JWT_TOKEN="hide"
    ports:
      - "${API_PORT:-5001}:${API_PORT:-5001}"
    depends_on:
      - mongo

  mongo:
    image: mongo:4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
